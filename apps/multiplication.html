<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>99 乘法表 - 展示模組</title>
    <link rel="stylesheet" href="../common/style.css">
    <style>
        .table-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .table-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeIn 0.5s ease-out;
            animation-fill-mode: both;
        }

        .table-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
            border-color: #a855f7;
        }

        .table-card h3 {
            color: #a855f7;
            margin-bottom: 1rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.8rem;
            font-size: 1.4rem;
        }

        .table-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.6rem;
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
        }

        .result-highlight {
            color: #38bdf8;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="app-header">
            <a href="../index.html" class="back-btn">← 返回專案總覽</a>
            <h1 class="app-title">展示二：99 乘法表</h1>
        </div>

        <main class="table-grid" id="multiplication-container">
            <!-- 乘法表卡片由 JavaScript 動態生成 -->
        </main>
    </div>

    <script>
        const container = document.getElementById('multiplication-container');
        let delay = 0;

        // 動態生成 2 到 9 的乘法表
        for (let i = 2; i <= 9; i++) {
            const card = document.createElement('div');
            card.className = 'table-card';
            card.style.animationDelay = `${delay}s`;
            delay += 0.05; // 漸進式動畫延遲

            let html = `<h3>${i} 的乘法</h3>`;
            for (let j = 1; j <= 9; j++) {
                // 格式化對齊
                const formattedJ = j;
                const result = i * j;
                const formattedResult = result < 10 ? '\u00A0' + result : result;

                html += `
                    <div class="table-row">
                        <span>${i} &nbsp;&times;&nbsp; ${formattedJ}</span>
                        <span>=&nbsp; <span class="result-highlight">${formattedResult}</span></span>
                    </div>
                `;
            }
            card.innerHTML = html;
            container.appendChild(card);
        }
    </script>
    <script src="../common/script.js"></script>
</body>

</html>
